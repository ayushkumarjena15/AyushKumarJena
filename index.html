    #devtools-screen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;

      z-index: 9999999;

    .dev-card {

      border: 1px solid #222;
      max-width: 450px;

      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .dev-icon {

      height: 50px;
      margin: 0 auto 1.5rem;

      color: #999;
    }

    .dev-small {
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.7rem;
      color: #777;
      margin-bottom: 0.5rem;
    }

    .dev-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .dev-title span {
      font-style: italic;
      color: #999;
      font-weight: 300;
    }

    .dev-text {
      color: #999;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .dev-btn {
      display: block;
      width: 100%;
      padding: 0.8rem;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 0.8rem;
      transition: all 0.2s;
    }

    .btn-white {
      background: white;
      color: black;
    }

    .btn-outline {
      border: 1px solid #333;
      color: white;
    }

    .dev-footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #555;
    }

      color: #777;
      text-decoration: none;
      margin: 0 10px;
    }

  <script>
    // Console Branding
    console.log(
      "%cBUILT BY AYUSH KUMAR JENA",

    );
    console.log(

      "color: #ffcc00; font-size: 14px;"
    );

    // Disable right-click & shortcuts
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    document.onkeydown = (e) => {
      if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) {
        return false;
      }
    };

    // Detection Logic
    (function () {
      const devtoolsScreen = () => document.getElementById('devtools-screen');
      
      const detect = () => {
        const threshold = 160;
        const widthThreshold = window.outerWidth - window.innerWidth > threshold;
        const heightThreshold = window.outerHeight - window.innerHeight > threshold;
        
        if (widthThreshold || heightThreshold) {
          devtoolsScreen().style.display = 'flex';
          document.body.style.overflow = 'hidden';
        } else {
          devtoolsScreen().style.display = 'none';
          document.body.style.overflow = 'auto';
        }
      };

      setInterval(detect, 500);
      window.addEventListener('resize', detect);
    })();
  </script>
