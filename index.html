  <style>
    #devtools-screen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;

    .dev-card {

      padding: 3.5rem 2.5rem;
      border-radius: 24px;

      max-width: 500px;
      width: 85%;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
      position: relative;
    }

    .dev-icon-wrapper {
      width: 60px;
      height: 60px;
      margin: 0 auto 2rem;
      background: #1a1a1a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #333;
    }

    .dev-small {
      text-transform: uppercase;
      letter-spacing: 3px;
      font-size: 0.65rem;
      color: #666;
      margin-bottom: 0.75rem;
      font-weight: 500;
    }

    .dev-title {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      letter-spacing: -0.5px;
    }

    .dev-title span {
      font-style: italic;
      color: #555;
      font-weight: 300;
    }

    .dev-text {
      color: #888;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .dev-btn {
      display: block;
      width: 100%;
      padding: 1rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 1rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 1rem;
    }

    .btn-white {
      background: #ffffff;
      color: #000000;
    }

    .btn-white:hover {
      background: #e5e5e5;
      transform: translateY(-2px);
    }

    .btn-outline {
      border: 1px solid #222;
      color: #ffffff;
      background: transparent;
    }

    .btn-outline:hover {
      background: #111;
      border-color: #444;
      transform: translateY(-2px);
    }

    .dev-footer {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: #444;
    }

    .dev-footer .links {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 1rem;
    }

    .dev-footer a {
      color: #666;
      text-decoration: none;
      transition: color 0.2s;
    }

    .dev-footer a:hover {
      color: #aaa;
    }

    .dev-footer span {
      color: #222;
    }
  </style>
  <script>
    // Console Branding
    console.log(
      "%cBUILT BY AYUSH KUMAR JENA",

    );
    console.log(
      "%cStealing code is not cool baby! If you wanna learn, ask me from the contact page 😉",
      "color: #ffcc00; font-size: 14px;"
    );

    // Disable right-click & shortcuts
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    document.onkeydown = (e) => {
      if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) {
        return false;
      }
    };

    // Detection Logic
    (function () {
      const devtoolsScreen = () => document.getElementById('devtools-screen');
      
      const detect = () => {
        const threshold = 160;
        const widthThreshold = window.outerWidth - window.innerWidth > threshold;
        const heightThreshold = window.outerHeight - window.innerHeight > threshold;
        
        if (widthThreshold || heightThreshold) {
          devtoolsScreen().style.display = 'flex';
          document.body.style.overflow = 'hidden';
        } else {
          devtoolsScreen().style.display = 'none';
          document.body.style.overflow = 'auto';
        }
      };

      setInterval(detect, 500);
      window.addEventListener('resize', detect);
    })();
  </script>
